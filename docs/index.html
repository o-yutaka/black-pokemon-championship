<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#05070b"><title>BLACK Battle Studio</title><style>:root{--b:#05070b;--p:#101824;--l:#26364d;--t:#f5f7fb;--m:#96a3b6;--a:#79aaff;--g:#52d69a;--r:#ff7088}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#10243a,transparent 28rem),linear-gradient(#05070b,#080d14);color:var(--t);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;min-height:100vh}.w{width:min(1060px,calc(100% - 24px));margin:auto}nav{position:sticky;top:0;z-index:5;background:#05070bd9;backdrop-filter:blur(14px);border-bottom:1px solid #ffffff0d}.nav{height:64px;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900}.btn,button,input,select{font:inherit}.btn,button{border:1px solid var(--l);border-radius:999px;background:#ffffff08;color:var(--t);padding:10px 15px;font-weight:800;cursor:pointer}a{color:inherit;text-decoration:none}.hero{padding:70px 0 38px}h1{font-size:clamp(44px,8vw,82px);line-height:.94;letter-spacing:-.06em;margin:0 0 20px}h1 span{display:block;background:linear-gradient(100deg,#fff,#9dc4ff 65%,#59e2ff);color:transparent;background-clip:text}.lead{color:#b0bbcb;font-size:18px;max-width:760px}.panel{border:1px solid #223148;border-radius:24px;background:linear-gradient(145deg,#111a27,#090e16);padding:24px;margin:22px 0}.drop{border:1px dashed #49678d;border-radius:18px;padding:28px;text-align:center;background:#0a111b}.drop.drag{border-color:#59e2ff;background:#0d1b29}.muted{color:var(--m);font-size:13px}.tools{display:grid;grid-template-columns:1fr 180px 160px auto;gap:10px;margin:18px 0}.field{width:100%;border:1px solid #2c3d55;border-radius:13px;background:#0a111b;color:var(--t);padding:11px 13px}.meta{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--m);font-size:12px;margin-bottom:12px}.ok{color:var(--g)}.err{color:var(--r)}.table{border:1px solid #223148;border-radius:16px;overflow:auto;max-height:620px}.row{display:grid;grid-template-columns:90px minmax(180px,1.3fr) minmax(120px,.7fr) 90px 90px;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid #1d293a;background:#0b111a;cursor:pointer}.row:hover{background:#101a28}.row.head{position:sticky;top:0;background:#111a27;color:#8492a6;font-size:11px;font-weight:900;cursor:default}.name{font-weight:900}.chip{display:inline-flex;padding:4px 8px;border:1px solid #31445f;border-radius:999px;font-size:11px;color:#c0ccdb}.empty{padding:38px;text-align:center;color:#8391a4}dialog{width:min(720px,calc(100% - 24px));max-height:84vh;border:1px solid #334966;border-radius:22px;background:#0a111b;color:var(--t);padding:0}dialog::backdrop{background:#020407cc}.mh{position:sticky;top:0;background:#0d1622;border-bottom:1px solid #26364b;padding:18px;display:flex;justify-content:space-between}.mb{padding:18px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.d{padding:12px;border:1px solid #27374e;border-radius:12px;background:#101925}.d small{display:block;color:#7f8da0}.raw{white-space:pre-wrap;background:#070c13;border:1px solid #24344a;border-radius:12px;padding:12px;overflow:auto;font:12px/1.5 monospace;color:#93a3b8;margin-top:15px}@media(max-width:700px){.tools{grid-template-columns:1fr 1fr}.row{grid-template-columns:72px minmax(150px,1fr) 100px}.row>*:nth-child(4),.row>*:nth-child(5){display:none}.grid{grid-template-columns:1fr}}@media(max-width:480px){.tools{grid-template-columns:1fr}.hero{padding-top:48px}h1{font-size:48px}.panel{padding:18px}.row{grid-template-columns:58px minmax(140px,1fr) 88px}}</style></head><body><nav><div class="w nav"><a class="brand" href="#top">BLACK Battle Studio</a><a class="btn" href="https://github.com/o-yutaka/black-pokemon-championship" target="_blank" rel="noreferrer">GitHub ↗</a></div></nav><main id="top"><section class="hero"><div class="w"><h1>カードデータを、<span>判断可能な一覧へ。</span></h1><p class="lead">CSV / TSV / JSONを複数同時に読み込み、カードIDを基準に名称・HP・タイプ・効果・デッキ枚数を端末内だけで結合する。</p></div></section><section><div class="w panel"><div id="drop" class="drop"><strong>カードファイルをここへドロップ</strong><p class="muted">または下のボタンから複数選択</p><input id="files" type="file" multiple accept=".csv,.tsv,.json" hidden><button id="pick">ファイルを選択</button><p class="muted">EN_Card_Data.csv / card_id_list.csv / deck.csv をまとめて選択可能</p></div><div class="tools"><input id="q" class="field" placeholder="名前・ID・効果で検索"><select id="cat" class="field"><option value="">全カテゴリ</option></select><select id="sort" class="field"><option value="id">ID順</option><option value="name">名前順</option><option value="hp">HP順</option><option value="qty">枚数順</option></select><button id="export" disabled>JSON出力</button></div><div class="meta"><span id="status">ファイル未読込</span><span id="count">0 cards</span></div><div id="table" class="table"><div class="empty">カードファイルを読み込むと、ここに一覧が出る。</div></div></div></section></main><dialog id="modal"><div class="mh"><div><strong id="mn"></strong><div id="mi" class="muted"></div></div><button id="close">閉じる</button></div><div class="mb"><div id="details" class="grid"></div><div id="text" style="margin-top:15px;white-space:pre-wrap"></div><pre id="raw" class="raw"></pre></div></dialog><script>const A={id:['id','card_id','cardid','card_number','number','index'],name:['name','card_name','english_name','japanese_name','title'],cat:['category','card_type','supertype','type'],hp:['hp','hit_points','health'],qty:['quantity','qty','count','copies','deck_count'],stage:['stage','subtype','sub_type'],energy:['energy_type','color','element'],text:['text','effect','description','ability_text','attack_text']};let cards=[];const $=s=>document.querySelector(s),norm=s=>String(s??'').trim(),key=s=>norm(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');function val(o,ks){const m={};Object.entries(o).forEach(([k,v])=>m[key(k)]=v);for(const k of ks)if(m[k]!==undefined&&norm(m[k])!=='')return m[k];return''}function csv(t,d=','){const lines=t.replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return[];const parse=l=>{let a=[],c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'&&l[i+1]==='"'&&q){c+='"';i++}else if(ch==='"')q=!q;else if(ch===d&&!q){a.push(c);c=''}else c+=ch}a.push(c);return a};const h=parse(lines[0]);return lines.slice(1).map(l=>Object.fromEntries(h.map((x,i)=>[x,parse(l)[i]??''])))}function rows(name,t){if(name.endsWith('.json')){const j=JSON.parse(t),x=Array.isArray(j)?j:(j.cards||j.data||j.rows||j.items||j.records||Object.entries(j).map(([id,v])=>typeof v==='object'?{id,...v}:{id,value:v}));return Array.isArray(x)?x:[]}return csv(t,name.endsWith('.tsv')?'\t':',')}function merge(all){const m=new Map;for(const r of all){const id=norm(val(r,A.id));if(!id)continue;const prev=m.get(id)||{id,_raw:{}};Object.assign(prev._raw,r);const n=norm(val(r,A.name)),c=norm(val(r,A.cat)),hp=Number(val(r,A.hp)),q=Number(val(r,A.qty)),st=norm(val(r,A.stage)),en=norm(val(r,A.energy)),tx=norm(val(r,A.text));if(n)prev.name=n;if(c)prev.category=c;if(Number.isFinite(hp)&&hp)prev.hp=hp;if(Number.isFinite(q))prev.quantity=q;if(st)prev.stage=st;if(en)prev.energy=en;if(tx)prev.text=[prev.text,tx].filter(Boolean).join('\n');m.set(id,prev)}cards=[...m.values()]}function render(){const q=$('#q').value.toLowerCase(),cat=$('#cat').value,sort=$('#sort').value;let x=cards.filter(c=>(!cat||c.category===cat)&&(!q||JSON.stringify(c).toLowerCase().includes(q)));x.sort((a,b)=>sort==='name'?norm(a.name).localeCompare(norm(b.name)):sort==='hp'?(b.hp||0)-(a.hp||0):sort==='qty'?(b.quantity||0)-(a.quantity||0):norm(a.id).localeCompare(norm(b.id),undefined,{numeric:true}));$('#count').textContent=`${x.length} / ${cards.length} cards`;$('#table').innerHTML='<div class="row head"><span>ID</span><span>Name</span><span>Category</span><span>HP</span><span>Qty</span></div>'+x.map((c,i)=>`<div class="row" data-i="${cards.indexOf(c)}"><span>${esc(c.id)}</span><span class="name">${esc(c.name||'Unknown')}</span><span><span class="chip">${esc(c.category||'Unknown')}</span></span><span>${c.hp??'-'}</span><span>${c.quantity??'-'}</span></div>`).join('');document.querySelectorAll('.row[data-i]').forEach(r=>r.onclick=()=>openCard(cards[+r.dataset.i]))}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function openCard(c){$('#mn').textContent=c.name||'Unknown';$('#mi').textContent='ID '+c.id;$('#details').innerHTML=[['Category',c.category],['Stage',c.stage],['HP',c.hp],['Energy',c.energy],['Quantity',c.quantity]].filter(x=>x[1]!==undefined&&x[1]!=='').map(x=>`<div class="d"><small>${x[0]}</small><strong>${esc(x[1])}</strong></div>`).join('');$('#text').textContent=c.text||'';$('#raw').textContent=JSON.stringify(c._raw,null,2);$('#modal').showModal()}async function load(fs){try{let all=[];for(const f of fs)all.push(...rows(f.name.toLowerCase(),await f.text()));merge(all);const cs=[...new Set(cards.map(c=>c.category).filter(Boolean))].sort();$('#cat').innerHTML='<option value="">全カテゴリ</option>'+cs.map(c=>`<option>${esc(c)}</option>`).join('');$('#status').className='ok';$('#status').textContent=`${fs.length} files loaded`;$('#export').disabled=!cards.length;render()}catch(e){$('#status').className='err';$('#status').textContent='読込エラー: '+e.message}}$('#pick').onclick=()=>$('#files').click();$('#files').onchange=e=>load([...e.target.files]);['q','cat','sort'].forEach(id=>$('#'+id).addEventListener(id==='q'?'input':'change',render));$('#export').onclick=()=>{const b=new Blob([JSON.stringify(cards.map(({_raw,...x})=>x),null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='black-card-library.json';a.click();URL.revokeObjectURL(u)};$('#close').onclick=()=>$('#modal').close();['dragenter','dragover'].forEach(x=>$('#drop').addEventListener(x,e=>{e.preventDefault();$('#drop').classList.add('drag')}));['dragleave','drop'].forEach(x=>$('#drop').addEventListener(x,e=>{e.preventDefault();$('#drop').classList.remove('drag')}));$('#drop').addEventListener('drop',e=>load([...e.dataTransfer.files]));</script></body></html>
