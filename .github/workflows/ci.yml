name: black-worldline-gate
on:
  pull_request:
  push:
    branches:
      - feature/dragapult-worldline-runners
      - feature/rocket-mewtwo-worldline-runners
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest
      - run: python scripts/static_gate.py
      - name: Run pytest with captured log
        shell: bash
        run: |
          set +e
          python -m pytest -q 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: warn
