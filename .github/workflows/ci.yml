name: dragapult-clean-gate
on:
  pull_request:
  push:
    branches: [black/dragapult-clean-v1]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest
      - run: python scripts/static_gate.py
      - run: python -m pytest -q
