name: BLACK Battle Studio Pages

on:
  push:
    branches: [main]
    paths:
      - "tools/battle_studio/frontend/**"
      - ".github/workflows/black-battle-studio-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install frontend dependencies
        working-directory: tools/battle_studio/frontend
        run: npm install --no-audit --no-fund

      - name: Build Japanese Battle Studio
        working-directory: tools/battle_studio/frontend
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Battle Studio artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: tools/battle_studio/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
